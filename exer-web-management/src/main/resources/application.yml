spring:
  application:
    name: exer-web-management
  # mysql连接配置
  datasource:
    # url: jdbc:mysql://localhost:3306/exer
    url: jdbc:mysql://mysql:3306/exer
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    # password: 990112
    password: 123
  servlet:
    multipart:
      # 最大单个文件大小
      max-file-size: 10MB
      # 最大请求大小
      max-request-size: 100MB

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名映射开关
    map-underscore-to-camel-case: true

# 配置事务管理日志级别
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

# 阿里云OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-ai-04-07
    region: cn-beijing